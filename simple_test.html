<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XSS 简单测试环境</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        h1 {
            color: #fff;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .warning {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            padding: 15px 20px;
            border-radius: 10px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .info-box {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .info-box h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .code-display {
            background: #0d0d0d;
            color: #00ff00;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Consolas', 'Monaco', monospace;
            white-space: pre-wrap;
            word-break: break-all;
            margin: 15px 0;
            border: 1px solid #333;
            max-height: 300px;
            overflow-y: auto;
        }
        .test-area {
            background: #fff;
            color: #333;
            padding: 30px;
            border-radius: 10px;
            min-height: 200px;
            margin: 20px 0;
            border: 3px dashed #667eea;
        }
        .test-area:empty::before {
            content: '🎯 Payload将在此区域渲染执行...';
            color: #999;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
        }
        .btn-success {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
        }
        .trigger-info {
            background: rgba(102, 126, 234, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            border-left: 4px solid #667eea;
        }
        .manual-test {
            background: rgba(255, 193, 7, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            border-left: 4px solid #ffc107;
        }
        .manual-test input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: monospace;
        }
        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            z-index: 1000;
        }
        .close-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <button class="close-btn" onclick="window.history.back()">← 返回</button>
    
    <div class="container">
        <h1>🧪 XSS 简单测试环境</h1>
        <div class="warning">⚠️ 此页面用于安全测试，Payload将在下方渲染区域执行</div>
        
        <div class="info-box">
            <h3>📋 测试说明</h3>
            <p>• 此页面无任何安全限制，可测试各种XSS向量</p>
            <p>• 部分Payload需要用户交互（如点击、悬停）才能触发</p>
            <p>• 如果Payload未执行，请查看下方的触发提示</p>
        </div>
        
        <h3 style="color: #667eea; margin: 20px 0 10px;">📝 Payload 源代码</h3>
        <div class="code-display" id="payloadCode">加载中...</div>
        
        <div class="trigger-info" id="triggerHint" style="display: none;">
            <strong>💡 触发提示：</strong>
            <div id="triggerText"></div>
        </div>
        
        <h3 style="color: #667eea; margin: 20px 0 10px;">🎯 渲染执行区域</h3>
        <div class="test-area" id="renderArea">
            <p style="color: #999;">等待渲染...</p>
        </div>
        
        <div class="manual-test">
            <strong>🔧 手动测试：</strong>
            <p style="margin: 10px 0; font-size: 14px;">如果Payload未自动执行，可以在此手动输入测试：</p>
            <input type="text" id="manualInput" placeholder="输入Payload或修改上面的Payload...">
            <button class="btn btn-primary" onclick="executeManual()">执行Payload</button>
            <button class="btn btn-danger" onclick="clearTest()">清空测试区</button>
        </div>
        
        <div class="btn-group">
            <button class="btn btn-success" onclick="window.history.back()">← 返回Payload库</button>
        </div>
    </div>
    
    <script>
        let currentPayload = '';
        
        // 检测Payload类型并返回触发提示
        function analyzePayload(payload) {
            const hints = [];
            
            if (payload.includes('onclick') || payload.includes('OnClick')) {
                hints.push('• 此Payload包含 <strong>onclick</strong> 事件，需要<strong>点击</strong>元素才能触发');
            }
            if (payload.includes('onmouseover') || payload.includes('OnMouseOver')) {
                hints.push('• 此Payload包含 <strong>onmouseover</strong> 事件，需要<strong>鼠标悬停</strong>才能触发');
            }
            if (payload.includes('onfocus') || payload.includes('OnFocus')) {
                hints.push('• 此Payload包含 <strong>onfocus</strong> 事件，需要<strong>聚焦</strong>元素才能触发');
            }
            if (payload.includes('onerror') && payload.includes('img')) {
                hints.push('• 此Payload包含 <strong>img onerror</strong>，如果图片加载失败将自动触发');
            }
            if (payload.includes('onload') && !payload.includes('<script')) {
                hints.push('• 此Payload包含 <strong>onload</strong> 事件，元素加载完成后将自动触发');
            }
            if (payload.includes('javascript:') && payload.includes('href')) {
                hints.push('• 此Payload包含 <strong>javascript:</strong> 协议，需要<strong>点击链接</strong>才能触发');
            }
            if (payload.includes('<svg') && payload.includes('onload')) {
                hints.push('• 此Payload使用 <strong>SVG onload</strong>，将自动触发');
            }
            if (payload.includes('<body') && payload.includes('onload')) {
                hints.push('• 此Payload使用 <strong>body onload</strong>，但在此页面可能无法触发（body已加载）');
            }
            if (payload.includes('<iframe')) {
                hints.push('• 此Payload包含 <strong>iframe</strong>，可能需要等待加载');
            }
            if (payload.includes('eval(') || payload.includes('eval (')) {
                hints.push('• 此Payload使用 <strong>eval()</strong>，将自动执行');
            }
            if (payload.includes('<script>') || payload.includes('<script ')) {
                hints.push('• 此Payload包含 <strong>script标签</strong>，将自动执行');
            }
            
            return hints;
        }
        
        // 从URL参数获取payload数据
        function getPayloadFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const encodedPayload = urlParams.get('test');
            
            if (!encodedPayload) {
                document.getElementById('payloadCode').textContent = '错误：未找到Payload数据';
                document.getElementById('renderArea').innerHTML = '<p style="color: red;">错误：未找到Payload数据</p>';
                return;
            }
            
            try {
                // 解码payload (Base64 -> encodeURIComponent)
                const payload = decodeURIComponent(atob(encodedPayload));
                currentPayload = payload;
                
                // 显示payload代码
                document.getElementById('payloadCode').textContent = payload;
                document.getElementById('manualInput').value = payload;
                
                // 分析Payload并显示触发提示
                const hints = analyzePayload(payload);
                if (hints.length > 0) {
                    document.getElementById('triggerText').innerHTML = hints.join('<br>');
                    document.getElementById('triggerHint').style.display = 'block';
                }
                
                // 在渲染区域执行payload
                executePayload(payload);
                
                console.log('✅ Payload已加载');
                console.log('📝 Payload代码:', payload);
                console.log('💡 触发提示:', hints);
                
            } catch (error) {
                console.error('❌ 解析Payload失败:', error);
                document.getElementById('payloadCode').textContent = '错误：Payload解析失败';
                document.getElementById('renderArea').innerHTML = '<p style="color: red;">错误：Payload解析失败 - ' + error.message + '</p>';
            }
        }
        
        // 执行Payload（特殊处理script标签）
        function executePayload(payload) {
            const renderArea = document.getElementById('renderArea');
            renderArea.innerHTML = '';
            
            // 检查是否包含script标签
            const scriptRegex = /<script[^>]*>([\s\S]*?)<\/script>/gi;
            const hasScript = scriptRegex.test(payload);
            
            if (hasScript) {
                // 提取script内容并执行
                const scriptContent = payload.replace(scriptRegex, function(match, code) {
                    return '';
                });
                
                // 先插入非script内容
                renderArea.innerHTML = scriptContent;
                
                // 提取并执行所有script
                const scripts = payload.match(/<script[^>]*>[\s\S]*?<\/script>/gi) || [];
                scripts.forEach(function(scriptTag) {
                    // 提取script内容
                    const codeMatch = scriptTag.match(/<script[^>]*>([\s\S]*?)<\/script>/i);
                    if (codeMatch && codeMatch[1]) {
                        try {
                            // 创建新的script元素并执行
                            const script = document.createElement('script');
                            script.textContent = codeMatch[1];
                            renderArea.appendChild(script);
                        } catch (e) {
                            console.error('Script执行错误:', e);
                        }
                    }
                });
            } else {
                // 直接插入HTML
                renderArea.innerHTML = payload;
            }
        }
        
        // 手动执行Payload
        function executeManual() {
            const payload = document.getElementById('manualInput').value;
            if (!payload) {
                alert('请输入Payload');
                return;
            }
            
            currentPayload = payload;
            document.getElementById('payloadCode').textContent = payload;
            
            // 分析Payload并显示触发提示
            const hints = analyzePayload(payload);
            if (hints.length > 0) {
                document.getElementById('triggerText').innerHTML = hints.join('<br>');
                document.getElementById('triggerHint').style.display = 'block';
            } else {
                document.getElementById('triggerHint').style.display = 'none';
            }
            
            // 执行Payload
            executePayload(payload);
            console.log('✅ 手动执行Payload:', payload);
        }
        
        // 清空测试区
        function clearTest() {
            document.getElementById('renderArea').innerHTML = '<p style="color: #999;">等待渲染...</p>';
            document.getElementById('manualInput').value = '';
            document.getElementById('payloadCode').textContent = '';
            document.getElementById('triggerHint').style.display = 'none';
        }
        
        // 页面加载完成后执行
        window.addEventListener('DOMContentLoaded', getPayloadFromURL);
        
        console.log('🧪 XSS简单测试环境已就绪');
        console.log('🔓 此页面无任何安全限制');
    </script>
</body>
</html>
